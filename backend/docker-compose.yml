version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthsync
      POSTGRES_PASSWORD: healthsync
      POSTGRES_DB: healthsync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthsync"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: "postgresql://healthsync:healthsync@postgres:5432/healthsync?schema=public"
      JWT_SECRET: "change-me-in-real-deployments-32-bytes-min"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

volumes:
  pgdata:
